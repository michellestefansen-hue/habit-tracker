<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark warm background -->
    <linearGradient id="appbg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>

    <!-- Metallic amber bezel — radial for 3D sphere shading -->
    <radialGradient id="bezel" cx="36%" cy="30%" r="72%" fx="36%" fy="30%">
      <stop offset="0%"   stop-color="#fef9c3"/>
      <stop offset="20%"  stop-color="#fbbf24"/>
      <stop offset="60%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>

    <!-- Crown gradient — cylindrical look -->
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="45%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Side buttons -->
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Watch face — warm cream -->
    <radialGradient id="face" cx="42%" cy="38%" r="68%">
      <stop offset="0%"   stop-color="#fffbeb"/>
      <stop offset="75%"  stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Glass reflection overlay -->
    <radialGradient id="glass" cx="33%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.60)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Bottom-right shadow on face for depth -->
    <radialGradient id="faceShadow" cx="72%" cy="72%" r="55%">
      <stop offset="0%"   stop-color="rgba(146,64,14,0.22)"/>
      <stop offset="100%" stop-color="rgba(146,64,14,0)"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="rgba(0,0,0,0.65)"/>
    </filter>

    <!-- Blur for cast shadow ellipse -->
    <filter id="blurShadow">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="110" fill="url(#appbg)"/>

  <!-- Soft cast shadow on "surface" -->
  <ellipse cx="263" cy="462" rx="145" ry="18" fill="black" opacity="0.45" filter="url(#blurShadow)"/>

  <g filter="url(#dropshadow)">

    <!-- Crown (top button) -->
    <rect x="220" y="86" width="72" height="34" rx="11" fill="url(#crown)"/>
    <!-- Crown highlight line -->
    <rect x="226" y="90" width="60" height="9" rx="5" fill="rgba(255,255,255,0.38)"/>

    <!-- Left side button -->
    <rect x="141" y="130" width="44" height="20" rx="10" fill="url(#btn)"
          transform="rotate(-38 163 140)"/>
    <!-- Left button highlight -->
    <rect x="141" y="130" width="44" height="8" rx="5" fill="rgba(255,255,255,0.35)"
          transform="rotate(-38 163 140)"/>

    <!-- Right side button -->
    <rect x="327" y="130" width="44" height="20" rx="10" fill="url(#btn)"
          transform="rotate(38 349 140)"/>
    <!-- Right button highlight -->
    <rect x="327" y="130" width="44" height="8" rx="5" fill="rgba(255,255,255,0.35)"
          transform="rotate(38 349 140)"/>

    <!-- Bezel depth shadow (offset slightly down-right) -->
    <circle cx="262" cy="302" r="155" fill="#4a1500" opacity="0.55"/>

    <!-- Main bezel -->
    <circle cx="256" cy="295" r="155" fill="url(#bezel)"/>

    <!-- Thin edge ring between bezel and face -->
    <circle cx="256" cy="295" r="123" fill="none" stroke="#e5c97a" stroke-width="3"/>

    <!-- Watch face -->
    <circle cx="256" cy="295" r="122" fill="url(#face)"/>

    <!-- Face shadow overlay (adds bottom-right depth) -->
    <circle cx="256" cy="295" r="122" fill="url(#faceShadow)"/>

    <!-- Tick marks (12, 3, 6, 9) -->
    <line x1="256" y1="183" x2="256" y2="200" stroke="#92400e" stroke-width="7" stroke-linecap="round"/>
    <line x1="368" y1="295" x2="351" y2="295" stroke="#92400e" stroke-width="7" stroke-linecap="round"/>
    <line x1="256" y1="407" x2="256" y2="390" stroke="#92400e" stroke-width="7" stroke-linecap="round"/>
    <line x1="144" y1="295" x2="161" y2="295" stroke="#92400e" stroke-width="7" stroke-linecap="round"/>

    <!-- Hour hand -->
    <line x1="256" y1="295" x2="256" y2="222" stroke="#78350f" stroke-width="11" stroke-linecap="round"/>
    <!-- Hour hand highlight -->
    <line x1="256" y1="295" x2="256" y2="222" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>

    <!-- Minute hand -->
    <line x1="256" y1="295" x2="326" y2="295" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>
    <!-- Minute hand highlight -->
    <line x1="256" y1="295" x2="326" y2="295" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>

    <!-- Center cap -->
    <circle cx="256" cy="295" r="11" fill="#b45309"/>
    <circle cx="256" cy="295" r="5"  fill="#fef9c3"/>

    <!-- Glass shine overlay -->
    <circle cx="256" cy="295" r="122" fill="url(#glass)"/>

    <!-- Bezel top-left specular highlight (rim light) -->
    <path d="M 180 200 A 155 155 0 0 1 340 165" fill="none"
          stroke="rgba(255,255,255,0.30)" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
