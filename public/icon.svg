<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="appbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9ee"/>
      <stop offset="100%" stop-color="#fdecc8"/>
    </linearGradient>

    <!-- Orange bezel — 3D sphere shading -->
    <radialGradient id="bezel" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fed7aa"/>
      <stop offset="28%"  stop-color="#fb923c"/>
      <stop offset="65%"  stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>

    <!-- Subtle shadow on bottom of bezel -->
    <radialGradient id="bezelShade" cx="62%" cy="68%" r="52%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.20)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Gray metallic crown -->
    <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f3f4f6"/>
      <stop offset="45%"  stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>

    <!-- Orange button gradient -->
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <!-- Face inner shadow (recessed feel) -->
    <radialGradient id="faceShade" cx="50%" cy="50%" r="50%">
      <stop offset="78%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.07)"/>
    </radialGradient>

    <!-- Drop shadow for whole watch -->
    <filter id="watchShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="10" dy="14" stdDeviation="22" flood-color="rgba(0,0,0,0.22)"/>
    </filter>

    <!-- Soft blur for cast shadow ellipse -->
    <filter id="castBlur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#appbg)"/>

  <!-- Speed lines (light blue) — left side -->
  <g fill="#93c5fd">
    <rect x="34"  y="192" width="118" height="16" rx="8"/>
    <rect x="50"  y="217" width="96"  height="16" rx="8"/>
    <rect x="65"  y="242" width="74"  height="16" rx="8"/>
    <rect x="38"  y="290" width="110" height="16" rx="8"/>
    <rect x="54"  y="315" width="88"  height="16" rx="8"/>
    <rect x="70"  y="340" width="66"  height="16" rx="8"/>
  </g>

  <!-- Cast shadow on "surface" -->
  <ellipse cx="294" cy="462" rx="148" ry="20" fill="black" opacity="0.18" filter="url(#castBlur)"/>

  <g filter="url(#watchShadow)">

    <!-- Gray crown (center top) -->
    <rect x="265" y="96" width="50" height="26" rx="10" fill="url(#crownGrad)"/>
    <rect x="270" y="100" width="40" height="10" rx="5" fill="rgba(255,255,255,0.50)"/>

    <!-- Left orange button (~11 o'clock rim) -->
    <rect x="206" y="102" width="38" height="22" rx="9" fill="url(#btnGrad)"
          transform="rotate(-32 225 113)"/>
    <rect x="206" y="102" width="38" height="9"  rx="5" fill="rgba(255,255,255,0.40)"
          transform="rotate(-32 225 113)"/>

    <!-- Right orange button (~1 o'clock rim) -->
    <rect x="336" y="102" width="38" height="22" rx="9" fill="url(#btnGrad)"
          transform="rotate(32 355 113)"/>
    <rect x="336" y="102" width="38" height="9"  rx="5" fill="rgba(255,255,255,0.40)"
          transform="rotate(32 355 113)"/>

    <!-- Bezel depth shadow (offset blob) -->
    <circle cx="296" cy="288" r="152" fill="#7c2d12" opacity="0.45"/>

    <!-- Main bezel -->
    <circle cx="288" cy="278" r="152" fill="url(#bezel)"/>
    <circle cx="288" cy="278" r="152" fill="url(#bezelShade)"/>

    <!-- Thin inner ring -->
    <circle cx="288" cy="278" r="121" fill="white" stroke="#d1d5db" stroke-width="2"/>

    <!-- Face shadow overlay -->
    <circle cx="288" cy="278" r="121" fill="url(#faceShade)"/>

    <!-- 12 tick marks -->
    <g transform="translate(288,278)" stroke="#111827" stroke-linecap="round" stroke-width="7">
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(0)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(30)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(60)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(90)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(120)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(150)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(180)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(210)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(240)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(270)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(300)"/>
      <line x1="0" y1="-111" x2="0" y2="-98" transform="rotate(330)"/>
    </g>

    <!-- Clock hands (10:10 position) -->
    <g transform="translate(288,278)" stroke-linecap="round">
      <!-- Hour hand → 10 o'clock = rotate(300) -->
      <line x1="0" y1="16" x2="0" y2="-70" stroke="#111827" stroke-width="11" transform="rotate(300)"/>
      <!-- Minute hand → 2 o'clock = rotate(60) -->
      <line x1="0" y1="18" x2="0" y2="-94" stroke="#111827" stroke-width="9"  transform="rotate(60)"/>
    </g>

    <!-- Center hub -->
    <circle cx="288" cy="278" r="13" fill="#f97316"/>
    <circle cx="288" cy="278" r="7"  fill="#fb923c"/>
    <circle cx="288" cy="278" r="3"  fill="white"/>

  </g>
</svg>
