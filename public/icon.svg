<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Heroicon-style stopwatch (scaled up, stroke-based, white) -->
  <!-- Crown -->
  <rect x="218" y="72" width="76" height="40" rx="14" fill="none" stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left button -->
  <line x1="176" y1="118" x2="148" y2="148" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Right button -->
  <line x1="336" y1="118" x2="364" y2="148" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Watch body circle -->
  <circle cx="256" cy="316" r="172" fill="none" stroke="white" stroke-width="22"/>

  <!-- Hour hand (pointing up-left, ~10 o'clock) -->
  <line x1="256" y1="316" x2="256" y2="208" stroke="white" stroke-width="22" stroke-linecap="round"/>

  <!-- Minute hand (pointing right, ~3 o'clock) -->
  <line x1="256" y1="316" x2="336" y2="316" stroke="white" stroke-width="22" stroke-linecap="round"/>
</svg>
